version: 0.2

env:
  variables:
    NODE_ENV: production
    NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: octolife-3.myshopify.com
    NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: 3b12d6020365806434052cc061a5b5e3
    NEXT_PUBLIC_S3_BUCKET_URL: https://optimist-fe-assets.s3.amazonaws.com
    NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL: https://script.google.com/macros/s/AKfycbz0eUZbOOD2v0qHcxlpTV-GAJaSvVx8S-CR6jyAVFy2jJPt5Dr6oYllPhziEikExwGb/exec
    NEXT_PUBLIC_GST_VERIFY_API_URL: https://mg1up8l9ee.execute-api.us-east-1.amazonaws.com/gst/verify
    NEXT_PUBLIC_INVOICE_API_URL: https://mg1up8l9ee.execute-api.us-east-1.amazonaws.com/invoice
    NEXT_PUBLIC_FEEDBACK_WEBHOOK_URL: https://script.google.com/macros/s/AKfycbwr2NkZCUsoxrB3ksfBrniquGKTuBhUyRp4Q9VsmNJe3WwyZhYHOY7QmSJg1_whCeG5/exec
    NEXT_PUBLIC_CLOUDINARY_CLOUD: da90e0enr
    NEXT_PUBLIC_CLOUDINARY_PRESET: po9daeov

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing dependencies
      - corepack enable
      - yarn install --immutable

  build:
    commands:
      - echo Running Next.js build
      - yarn build
      - test -d out || exit 1
      - echo Static export completed

  post_build:
    commands:
      - echo Deploying to S3
      # 1. Next.js hashed assets (/_next/static/*) — content-hashed, safe to cache forever.
      - aws s3 sync out/_next s3://$S3_BUCKET/_next --delete --cache-control "public, max-age=31536000, immutable"
      # 2. Other static files (images, fonts, videos, etc.) — cache for 30 days, can be re-validated.
      - aws s3 sync out s3://$S3_BUCKET --delete --exclude "_next/*" --exclude "*.html" --exclude "*.xml" --exclude "*.txt" --cache-control "public, max-age=2592000, must-revalidate"
      # 3. HTML / XML / TXT — short cache so deploys propagate quickly.
      - aws s3 sync out s3://$S3_BUCKET --delete --exclude "*" --include "*.html" --include "*.xml" --include "*.txt" --cache-control "public, max-age=300, must-revalidate"
      # 4. index.html — never cache so users always see the latest deploy.
      - aws s3 cp out/index.html s3://$S3_BUCKET/index.html --cache-control "max-age=0,no-cache,no-store,must-revalidate" --content-type text/html
      - echo Invalidating CloudFront
      - aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"

artifacts:
  files:
    - "**/*"
