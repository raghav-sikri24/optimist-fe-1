version: 0.2

env:
  variables:
    NODE_ENV: production
    NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: octolife-3.myshopify.com
    NEXT_PUBLIC_SHOPIFY_STOREFRONT_ACCESS_TOKEN: 3b12d6020365806434052cc061a5b5e3
    NEXT_PUBLIC_S3_BUCKET_URL: https://optimist-fe-assets.s3.amazonaws.com
    NEXT_PUBLIC_GOOGLE_SHEETS_WEBHOOK_URL: https://script.google.com/macros/s/AKfycbz0eUZbOOD2v0qHcxlpTV-GAJaSvVx8S-CR6jyAVFy2jJPt5Dr6oYllPhziEikExwGb/exec

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing dependencies
      - corepack enable
      - yarn install --immutable

  build:
    commands:
      - echo Running Next.js build
      - yarn build
      - test -d out || exit 1
      - echo Static export completed

  post_build:
    commands:
      - echo Deploying to S3
      - aws s3 sync out s3://$S3_BUCKET --delete
      - aws s3 cp out/index.html s3://$S3_BUCKET/index.html --cache-control max-age=0,no-cache,no-store,must-revalidate --content-type text/html
      - echo Invalidating CloudFront
      - aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"

artifacts:
  files:
    - "**/*"
